@if (stats$ | async; as stats) {
  <div class="stats-bar">
    @if (currentPrice$ | async; as current) {
      <div class="stat stat--current">
        <span class="stat__label">Now</span>
        <span class="stat__value">{{ current.ore_per_kWh | number: '1.2-2' }} øre/kWh</span>
      </div>
    }
    <div class="stat">
      <span class="stat__label">Min</span>
      <span class="stat__value stat__value--low">{{ stats.min | number: '1.2-2' }} øre/kWh</span>
    </div>
    <div class="stat">
      <span class="stat__label">Avg</span>
      <span class="stat__value">{{ stats.avg | number: '1.2-2' }} øre/kWh</span>
    </div>
    <div class="stat">
      <span class="stat__label">Max</span>
      <span class="stat__value stat__value--high">{{ stats.max | number: '1.2-2' }} øre/kWh</span>
    </div>
  </div>
}
