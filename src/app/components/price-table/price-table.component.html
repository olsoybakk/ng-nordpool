@if (rows$ | async; as rows) {
  @if (rows.length) {
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>{{ ls.t().time }}</th>
            <th>øre/kWh</th>
          </tr>
        </thead>
        <tbody>
          @for (row of rows; track row.time) {
            <tr [class.row--current]="row.isCurrent">
              <td class="cell--hour">
                {{ row.time }}
                @if (row.isCurrent) { <span class="badge">{{ ls.t().now }}</span> }
              </td>
              <td class="cell--price">{{ row.displayOre | number: '1.2-2' }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
}
