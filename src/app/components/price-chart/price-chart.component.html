@if (vm$ | async; as vm) {
  <div class="chart-header">
    <div class="chart-toggle" role="group" aria-label="Chart type">
      <button
        class="toggle-btn"
        [class.toggle-btn--active]="chartMode() === 'bar'"
        (click)="setMode('bar')"
        aria-label="Bar chart"
      >
        <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
          <rect x="1" y="6" width="3" height="9" rx="1"/>
          <rect x="6" y="3" width="3" height="12" rx="1"/>
          <rect x="11" y="8" width="3" height="7" rx="1"/>
        </svg>
        Bar
      </button>
      <button
        class="toggle-btn"
        [class.toggle-btn--active]="chartMode() === 'line'"
        (click)="setMode('line')"
        aria-label="Line chart"
      >
        <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
          <polyline points="1,13 5,7 9,9 13,3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
        Line
      </button>
    </div>
  </div>

  <div class="chart-wrapper">
    <svg
      class="chart"
      [attr.viewBox]="viewBox"
      preserveAspectRatio="xMidYMid meet"
      role="img"
      [attr.aria-label]="(chartMode() === 'bar' ? 'Bar' : 'Line') + ' chart of hourly electricity prices'"
    >
      <!-- Y-axis grid lines and labels -->
      @for (tick of vm.yTicks; track tick.y) {
        <line
          [attr.x1]="offsetX"
          [attr.y1]="tick.y"
          [attr.x2]="offsetX + chartW"
          [attr.y2]="tick.y"
          class="grid-line"
        />
        <text
          [attr.x]="offsetX - 8"
          [attr.y]="tick.y + 4"
          class="axis-label"
          text-anchor="end"
        >{{ tick.val | number: '1.2-2' }}</text>
      }

      @if (chartMode() === 'bar') {
        <!-- Bar chart -->
        @for (bar of vm.bars; track trackByHour($index, bar)) {
          <g class="bar-group" [class.bar-group--current]="bar.isCurrent">
            <rect
              [attr.x]="bar.x"
              [attr.y]="bar.barY"
              [attr.width]="vm.barW"
              [attr.height]="bar.barHeight"
              [attr.rx]="3"
              class="bar"
              [class.bar--low]="bar.priceLevel === 'low'"
              [class.bar--mid]="bar.priceLevel === 'mid'"
              [class.bar--high]="bar.priceLevel === 'high'"
              [class.bar--current]="bar.isCurrent"
            >
              <title>{{ bar.hour }}:00 — {{ bar.price.NOK_per_kWh | number: '1.2-2' }} kr/kWh</title>
            </rect>
            <text
              [attr.x]="bar.x + vm.barW / 2"
              [attr.y]="bottomY + 16"
              class="hour-label"
              text-anchor="middle"
            >@if (bar.hour % 3 === 0) { {{ bar.hour }} }</text>
          </g>
        }
      } @else {
        <!-- Line chart -->
        <polygon [attr.points]="vm.areaPoints" class="line-area" />
        <polyline [attr.points]="vm.linePoints" class="line-path" />

        @for (pt of vm.points; track trackByHour($index, pt)) {
          <g class="point-group">
            <circle
              [attr.cx]="pt.cx"
              [attr.cy]="pt.cy"
              [attr.r]="pt.isCurrent ? 5 : 3.5"
              class="line-dot"
              [class.line-dot--current]="pt.isCurrent"
            >
              <title>{{ pt.hour }}:00 — {{ pt.price.NOK_per_kWh | number: '1.2-2' }} kr/kWh</title>
            </circle>
            <text
              [attr.x]="pt.cx"
              [attr.y]="bottomY + 16"
              class="hour-label"
              text-anchor="middle"
            >@if (pt.hour % 3 === 0) { {{ pt.hour }} }</text>
          </g>
        }
      }

      <!-- Y-axis line -->
      <line
        [attr.x1]="offsetX"
        [attr.y1]="offsetY"
        [attr.x2]="offsetX"
        [attr.y2]="bottomY"
        class="axis-line"
      />

      <!-- Y-axis title -->
      <text
        [attr.x]="12"
        [attr.y]="offsetY + chartH / 2"
        class="axis-title"
        text-anchor="middle"
        [attr.transform]="'rotate(-90 12 ' + (offsetY + chartH / 2) + ')'"
      >kr/kWh</text>
    </svg>
  </div>
} @else {
  <div class="chart-empty">No data to display</div>
}
