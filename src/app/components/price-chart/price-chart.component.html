@if (vm$ | async; as vm) {
  <div class="chart-wrapper">
    <svg
      class="chart"
      [attr.viewBox]="viewBox"
      preserveAspectRatio="xMidYMid meet"
      role="img"
      [attr.aria-label]="(chartMode() === 'bar' ? 'Bar' : 'Line') + ' chart of hourly electricity prices'"
    >
      @if (chartMode() === 'line') {
        <!-- Zone bands -->
        @for (zone of vm.zones; track zone.level) {
          <rect
            [attr.x]="offsetX"
            [attr.y]="zone.y"
            [attr.width]="chartW"
            [attr.height]="zone.height"
            class="zone"
            [class.zone--low]="zone.level === 'low'"
            [class.zone--mid]="zone.level === 'mid'"
            [class.zone--high]="zone.level === 'high'"
          />
        }
      }

      <!-- Y-axis grid lines and labels -->
      @for (tick of (chartMode() === 'bar' ? vm.yTicks : vm.multiTicks); track tick.y) {
        <line
          [attr.x1]="offsetX"
          [attr.y1]="tick.y"
          [attr.x2]="offsetX + chartW"
          [attr.y2]="tick.y"
          class="grid-line"
        />
        <text
          [attr.x]="offsetX - 8"
          [attr.y]="tick.y + 4"
          class="axis-label"
          text-anchor="end"
        >{{ tick.val | number: '1.2-2' }}</text>
      }

      @if (chartMode() === 'bar') {
        <!-- Bar chart -->
        @for (bar of vm.bars; track trackByHour($index, bar)) {
          <g class="bar-group" [class.bar-group--current]="bar.isCurrent">
            <rect
              [attr.x]="bar.x"
              [attr.y]="bar.barY"
              [attr.width]="vm.barW"
              [attr.height]="bar.barHeight"
              [attr.rx]="3"
              class="bar"
              [class.bar--low]="bar.priceLevel === 'low'"
              [class.bar--mid]="bar.priceLevel === 'mid'"
              [class.bar--high]="bar.priceLevel === 'high'"
              [class.bar--current]="bar.isCurrent"
            >
              <title>{{ bar.hour }}:00 — {{ bar.price.NOK_per_kWh | number: '1.2-2' }} kr/kWh</title>
            </rect>
            <text
              [attr.x]="bar.x + vm.barW / 2"
              [attr.y]="bottomY + 16"
              class="hour-label"
              text-anchor="middle"
            >@if (bar.hour % 3 === 0) { {{ bar.hour }} }</text>
          </g>
        }
      } @else {
        <!-- Multi-area line chart — non-selected areas first, selected on top -->
        @for (line of vm.areaLines; track trackByArea($index, line)) {
          <g class="area-line" [class.area-line--selected]="line.isSelected">
            <polyline
              [attr.points]="line.linePoints"
              class="line-path"
              [attr.stroke]="line.color"
            >
              <title>{{ line.area }}</title>
            </polyline>

            @if (line.isSelected) {
              @for (pt of line.points; track pt.hour) {
                <circle
                  [attr.cx]="pt.cx"
                  [attr.cy]="pt.cy"
                  [attr.r]="pt.isCurrent ? 5 : 3"
                  class="line-dot"
                  [class.line-dot--current]="pt.isCurrent"
                  [attr.fill]="line.color"
                >
                  <title>{{ pt.hour }}:00 — {{ pt.nok | number: '1.2-2' }} kr/kWh</title>
                </circle>
              }
            }

            <!-- Area label at end of line -->
            <text
              [attr.x]="line.labelX"
              [attr.y]="line.labelY"
              class="area-label"
              [class.area-label--selected]="line.isSelected"
              [attr.fill]="line.color"
            >{{ line.area }}</text>
          </g>
        }

        <!-- Hour labels on X axis -->
        @for (bar of vm.bars; track bar.hour) {
          <text
            [attr.x]="offsetX + ($index + 0.5) * (chartW / 24)"
            [attr.y]="bottomY + 16"
            class="hour-label"
            text-anchor="middle"
          >@if (bar.hour % 3 === 0) { {{ bar.hour }} }</text>
        }
      }

      <!-- Y-axis line -->
      <line
        [attr.x1]="offsetX"
        [attr.y1]="offsetY"
        [attr.x2]="offsetX"
        [attr.y2]="bottomY"
        class="axis-line"
      />

      <!-- Y-axis title -->
      <text
        [attr.x]="12"
        [attr.y]="offsetY + chartH / 2"
        class="axis-title"
        text-anchor="middle"
        [attr.transform]="'rotate(-90 12 ' + (offsetY + chartH / 2) + ')'"
      >kr/kWh</text>
    </svg>
  </div>
} @else {
  <div class="chart-empty">No data to display</div>
}
