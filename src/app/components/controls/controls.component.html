<div class="controls">
  <div class="control-group">
    <label for="area-select">Price area</label>
    <div class="select-wrapper">
      <span class="area-dot" [style.background]="areaColors[currentArea]"></span>
      <select
        id="area-select"
        [ngModel]="currentArea"
        (ngModelChange)="onAreaChange($event)"
      >
        @for (area of areas; track area.value) {
          <option [value]="area.value">{{ area.label }}</option>
        }
      </select>
    </div>
  </div>

  <div class="control-group">
    <label for="date-input">Date</label>
    <div class="date-nav">
      <button class="nav-btn" (click)="stepDate(-1)" aria-label="Previous day">&lsaquo;</button>
      <input
        id="date-input"
        type="date"
        [ngModel]="currentDate"
        [max]="maxDate"
        (ngModelChange)="onDateChange($event)"
      />
      <button class="nav-btn" (click)="stepDate(1)" [disabled]="currentDate >= maxDate" aria-label="Next day">&rsaquo;</button>
    </div>
  </div>
</div>
