<div class="controls">
  <div class="control-group">
    <label for="area-select">Price area</label>
    <div class="area-select" [class.area-select--open]="dropdownOpen">
      <button
        id="area-select"
        type="button"
        class="area-select__trigger"
        [attr.aria-expanded]="dropdownOpen"
        aria-haspopup="listbox"
        (click)="toggleDropdown()"
        (keydown)="onTriggerKeydown($event)"
      >
        <span class="area-dot" [style.background]="areaColors[currentArea]"></span>
        <span class="area-select__label">{{ currentAreaLabel }}</span>
        <svg class="area-select__chevron" viewBox="0 0 10 6" aria-hidden="true" width="10" height="6">
          <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <ul class="area-select__options" role="listbox" aria-label="Price area">
        @for (area of areas; track area.value) {
          <li
            class="area-select__option"
            role="option"
            [attr.aria-selected]="area.value === currentArea"
            [class.area-select__option--selected]="area.value === currentArea"
            tabindex="0"
            (click)="selectAreaOption(area.value)"
            (keydown.enter)="selectAreaOption(area.value)"
            (keydown.space)="selectAreaOption(area.value)"
          >
            <span class="area-dot area-dot--inline" [style.background]="areaColors[area.value]"></span>
            {{ area.label }}
          </li>
        }
      </ul>
    </div>
  </div>

  <div class="control-group">
    <label for="date-input">Date</label>
    <div class="date-nav">
      <button class="nav-btn" (click)="stepDate(-1)" aria-label="Previous day">&lsaquo;</button>
      <input
        id="date-input"
        type="date"
        [ngModel]="currentDate"
        [max]="maxDate"
        (ngModelChange)="onDateChange($event)"
      />
      <button class="nav-btn" (click)="stepDate(1)" [disabled]="currentDate >= maxDate" aria-label="Next day">&rsaquo;</button>
    </div>
  </div>
</div>
