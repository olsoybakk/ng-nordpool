<div class="dashboard" [class.dashboard--viewport]="chartMode() === 'line'">
  <header class="dashboard__header">
    <div class="dashboard__title-row">
      <h1 class="dashboard__title">
        <span class="dashboard__logo">⚡</span> Nordpool Spot Prices
      </h1>
      <div class="dashboard__header-actions">
        <button
          class="theme-btn"
          (click)="toggleTheme()"
          [attr.aria-label]="theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          @if (theme() === 'dark') {
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="4"/>
              <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
          } @else {
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          }
        </button>

        <button
          class="toggle-btn"
          [class.toggle-btn--active]="includeTax()"
          (click)="toggleTax()"
          [attr.aria-pressed]="includeTax()"
          aria-label="Toggle tax (25% VAT)"
          title="Include 25% VAT (NO4 exempt)"
        >Tax</button>

        <button
          class="toggle-btn"
          [class.toggle-btn--active]="showNorgespris()"
          (click)="toggleNorgespris()"
          [attr.aria-pressed]="showNorgespris()"
          aria-label="Toggle Norgespris reference line"
          title="Show Norgespris (50 øre/kWh incl. tax)"
        >Norgespris</button>

        <div class="chart-toggle" role="group" aria-label="Chart type">
          <button
            class="toggle-btn"
            [class.toggle-btn--active]="chartMode() === 'line'"
            (click)="setChartMode('line')"
            aria-label="Line chart"
          >
            <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
              <polyline points="1,13 5,7 9,9 13,3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
            </svg>
            Line
          </button>
          <button
            class="toggle-btn"
            [class.toggle-btn--active]="chartMode() === 'bar'"
            (click)="setChartMode('bar')"
            aria-label="Bar chart"
          >
            <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
              <rect x="1" y="6" width="3" height="9" rx="1"/>
              <rect x="6" y="3" width="3" height="12" rx="1"/>
              <rect x="11" y="8" width="3" height="7" rx="1"/>
            </svg>
            Bar
          </button>
        </div>
      </div>
    </div>
    <p class="dashboard__subtitle">Day-ahead electricity prices</p>
  </header>

  <section class="dashboard__controls">
    <app-controls />
  </section>

  <div class="data-area">
    @if (error$ | async; as error) {
      <div class="error-banner" role="alert">
        <strong>Error:</strong> {{ error }}
      </div>
    }

    <section class="dashboard__stats" [class.dashboard__stats--loading]="(loading$ | async) || (allAreasLoading$ | async)">
      <app-stats-bar [includeTax]="includeTax()" />
    </section>

    <section class="dashboard__chart">
      @if ((loading$ | async) || (allAreasLoading$ | async)) {
        <div class="data-overlay" aria-hidden="true">
          <div class="spinner"></div>
        </div>
      }
      <h2 class="section-title">Hourly prices</h2>
      <app-price-chart
        [chartMode]="chartMode()"
        [includeTax]="includeTax()"
        [showNorgespris]="showNorgespris()"
      />
    </section>

    @if (chartMode() === 'bar' && (dateRangeDays$ | async) === 1) {
      <section class="dashboard__table" [class.dashboard__table--loading]="(loading$ | async) || (allAreasLoading$ | async)">
        <h2 class="section-title">All hours</h2>
        <app-price-table [includeTax]="includeTax()" />
      </section>
    }
  </div>
</div>
